name: CI/CD Pipeline (Linux EC2 Optimized)

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}:latest
            ${{ secrets.ECR_REGISTRY }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Linux EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          # Use bash explicitly and ensure login shell for correct PATH
          script_stop: true
          script: |
            # 1. Navigate to the project directory (create if not exists)
            PROJECT_DIR="~/2026_TRIPLES_TEAM_2_BE"
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR

            # 2. Update code and docker-compose configurations
            # If it's the first time, clone the repo; otherwise, pull
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi

            # 3. AWS ECR Login (Linux native way)
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
            sudo docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # 4. Pull latest image from ECR
            sudo docker compose pull

            # 5. Zero-downtime deployment attempt
            # --remove-orphans: Clean up containers not defined in the compose file
            # -d: Run in background
            sudo docker compose up -d --remove-orphans

            # 6. Cleanup: Remove dangling images to free up Linux storage
            sudo docker image prune -f

            # 7. Final status check
            sudo docker compose ps
